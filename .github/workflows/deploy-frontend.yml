name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "Frontend/**"
      - ".github/workflows/deploy-frontend.yml"

  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

env:
  GCP_REGION:   ${{ vars.GCP_REGION }}         # us-central1
  AR_REPO:      ${{ vars.AR_REPO }}             # ai-news
  SERVICE_NAME: ai-news-frontend
  IMAGE:        ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/frontend

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xác thực với Google Cloud qua Workload Identity Federation ────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SA_EMAIL }}

      # ── 3. Cài gcloud CLI ──────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Cấu hình Docker dùng Artifact Registry ─────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── 5. Lấy URL Backend từ Cloud Run ───────────────────────────────────
      - name: Get Backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe ai-news-backend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)" 2>/dev/null || echo "")
          # Fallback sang secret nếu backend chưa deploy
          if [ -z "$URL" ]; then
            URL="${{ secrets.BACKEND_URL }}"
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      # ── 6. Build Docker image (build context = repo root) ──────────────────
      - name: Build Docker image
        run: |
          docker build \
            -f Frontend/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      # ── 7. Push lên Artifact Registry ─────────────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 8. Deploy lên Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 60 \
            --set-env-vars "API_URL=${{ steps.backend.outputs.url }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # ── 9. In URL service sau khi deploy ──────────────────────────────────
      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "::notice title=Frontend URL::$URL"
          echo "Frontend deployed at: $URL"
